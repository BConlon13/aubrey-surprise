<!DOCTYPE html>
<html>
<head>
  <title>💌</title>

  <!-- Serif font -->
  <link href="https://fonts.googleapis.com/css2?family=EB+Garamond&display=swap" rel="stylesheet">

  <style>
    body {
      font-family: 'EB Garamond', serif;
      text-align: center;
      background: black;
      color: white;
      padding-top: 120px;
      transition: background 2s ease;
    }

    #login {
      transition: opacity 2s ease;
    }

    #content {
      display: none;
      opacity: 0;
      transition: opacity 3s ease;
    }

    h1 {
      font-size: 42px;
      letter-spacing: 1px;
    }

    h2 {
      font-weight: normal;
      letter-spacing: 1px;
      opacity: 0.85;
    }

    input {
      padding: 10px;
      font-size: 16px;
      margin-top: 20px;
      border: none;
      outline: none;
    }

    button {
      padding: 10px 15px;
      font-size: 16px;
      margin-left: 5px;
      cursor: pointer;
      border: none;
    }

    img {
      margin-top: 30px;
      max-width: 80%;
      box-shadow: 0 0 40px rgba(255,255,255,0.15);
    }
  </style>
</head>

<body>

  <h2>You already have the answer 💌</h2>

  <div id="login">
    <input type="password" id="password" placeholder="Enter password">
    <button onclick="checkPassword()">Unlock</button>
    <p id="error" style="color:#ff8080;"></p>
  </div>

  <div id="content">
    <h1>See you in Seattle…</h1>
    <p>I’ll be there soon.</p>
    <img src="see you in seattle (1).jpg">
  </div>

  <script>
    function checkPassword() {
      var pass = document.getElementById("password").value.toLowerCase();

      if (pass === "sleepless") {
        var content = document.getElementById("content");
        var login = document.getElementById("login");

        // fade out login slowly
        login.style.opacity = "0";

        setTimeout(function() {
          login.style.display = "none";

          // show content
          content.style.display = "block";

          // fade in content slowly
          setTimeout(function() {
            content.style.opacity = "1";
          }, 200);

        }, 2000); // slower fade out

        document.getElementById("error").innerText = "";
      } else {
        document.getElementById("error").innerText = "Not quite… try again 💭";
      }
    }
  </script>

</body>
</html>
