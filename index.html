<!DOCTYPE html>
<html>
<head>
  <title>💌</title>

  <style>
    body {
      font-family: "Times New Roman", Times, serif;
      text-align: center;
      background: #87CEEB; /* sky blue start */
      color: white;
      padding-top: 120px;
      overflow-y: auto;
      transition: background 3s ease;
    }

    /* Film grain (lighter for sky) */
    body::after {
      content: "";
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: url('https://www.transparenttextures.com/patterns/asfalt-light.png');
      opacity: 0.05;
      pointer-events: none;
    }

    /* Intro screen */
    #intro {
      position: fixed;
      width: 100%;
      height: 100%;
      background: #87CEEB;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      transition: opacity 2s ease;
      z-index: 10;
    }

    #intro h1 {
      font-size: 64px;
      font-weight: bold;
      letter-spacing: 6px;
      color: white;
    }

    #login {
      opacity: 0;
      transition: opacity 2s ease;
    }

    #content {
      display: none;
      opacity: 0;
      transition: opacity 3s ease;
    }

    #title {
      font-size: 48px;
      letter-spacing: 3px;
      margin-bottom: 20px;
      text-transform: uppercase;
    }

    #poster {
      opacity: 0;
      transition: opacity 3s ease;
      margin-top: 30px;
      max-width: 80%;
      box-shadow: 0 0 40px rgba(0,0,0,0.3);
    }

    input {
      padding: 10px;
      font-size: 16px;
      margin-top: 20px;
      border: none;
      outline: none;
    }

    button {
      padding: 10px 15px;
      font-size: 16px;
      margin-left: 5px;
      cursor: pointer;
      border: none;
    }
  </style>
</head>

<body>

  <!-- INTRO -->
  <div id="intro">
    <h1>NOW PLAYING</h1>
  </div>

  <!-- LOGIN -->
  <div id="login">
    <h2>You already have the answer 💌</h2>
    <input type="password" id="password" placeholder="Enter password">
    <button onclick="checkPassword()">Unlock</button>
    <p id="error" style="color:#ffd6d6;"></p>
  </div>

  <!-- CONTENT -->
  <div id="content">
    <h1 id="title">See You in Seattle…</h1>
    <img id="poster" src="see you in seattle (1).jpg">
  </div>

  <script>
    // INTRO → LOGIN
    window.onload = function() {
      setTimeout(function() {
        document.getElementById("intro").style.opacity = "0";

        setTimeout(function() {
          document.getElementById("intro").style.display = "none";
          document.getElementById("login").style.opacity = "1";
        }, 2000);

      }, 2000);
    };

    function checkPassword() {
      var pass = document.getElementById("password").value.toLowerCase();

      if (pass === "sleepless") {
        var login = document.getElementById("login");
        var content = document.getElementById("content");
        var poster = document.getElementById("poster");

        // fade out login
        login.style.opacity = "0";

        setTimeout(function() {
          login.style.display = "none";

          // change background to navy
          document.body.style.background = "#0B1F3A";

          content.style.display = "block";

          // fade in title
          setTimeout(function() {
            content.style.opacity = "1";
          }, 200);

          // then poster
          setTimeout(function() {
            poster.style.opacity = "1";
          }, 3000);

        }, 2000);

        document.getElementById("error").innerText = "";
      } else {
        document.getElementById("error").innerText = "Not quite… try again 💭";
      }
    }
  </script>

</body>
</html>
