<!DOCTYPE html>
<html>
<head>
  <title>💌</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      background: #f7f7f7;
      padding-top: 100px;
    }

    #content {
      display: none;
      opacity: 0;
      transition: opacity 1.5s ease;
    }

    #login {
      transition: opacity 0.8s ease;
    }

    input {
      padding: 10px;
      font-size: 16px;
    }

    button {
      padding: 10px 15px;
      font-size: 16px;
      margin-left: 5px;
    }
  </style>
</head>
<body>

  <h2>You already have the answer 💌</h2>

  <div id="login">
    <input type="password" id="password" placeholder="Enter password">
    <button onclick="checkPassword()">Unlock</button>
    <p id="error" style="color:red;"></p>
  </div>

  <div id="content">
    <h1>See you in Seattle… 💫</h1>
    <p>I’ll be there soon.</p>
    <img src="see you in seattle (1).jpg" style="max-width:80%;">
  </div>

  <script>
    function checkPassword() {
      var pass = document.getElementById("password").value.toLowerCase();

      if (pass === "sleepless") {
        var content = document.getElementById("content");
        var login = document.getElementById("login");

        // fade out input
        login.style.opacity = "0";

        setTimeout(function() {
          login.style.display = "none";
          content.style.display = "block";

          // trigger fade-in
          setTimeout(function() {
            content.style.opacity = "1";
          }, 50);

        }, 800);

        document.getElementById("error").innerText = "";
      } else {
        document.getElementById("error").innerText = "Not quite… try again 💭";
      }
    }
  </script>

</body>
</html>
