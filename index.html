<!DOCTYPE html>
<html>
<head>
  <title>💌</title>

  <style>
    body {
      font-family: "Times New Roman", Times, serif;
      text-align: center;
      background: #87CEEB;
      color: white;
      padding-top: 100px;
      overflow-y: auto;
      transition: background 2s ease;
    }

    /* Film grain */
    body::after {
      content: "";
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: url('https://www.transparenttextures.com/patterns/asfalt-light.png');
      opacity: 0.05;
      pointer-events: none;
    }

    /* Intro */
    #intro {
      position: fixed;
      width: 100%;
      height: 100%;
      background: #87CEEB;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: opacity 1.5s ease;
      z-index: 10;
    }

    #intro h1 {
      font-size: 60px;
      font-weight: bold;
      letter-spacing: 5px;
    }

    /* Login */
    #login {
      opacity: 0;
      transition: opacity 1.5s ease;
    }

    /* Fancy input wrapper */
    .input-box {
      margin-top: 25px;
    }

    input {
      width: 70%;
      max-width: 300px;
      padding: 14px;
      font-size: 18px;
      border-radius: 10px;
      border: none;
      outline: none;
      box-shadow: 0 4px 15px rgba(0,0,0,0.2);
      text-align: center;
    }

    button {
      display: block;
      margin: 15px auto 0;
      padding: 12px 20px;
      font-size: 16px;
      border-radius: 25px;
      border: none;
      background: white;
      color: #0B1F3A;
      font-weight: bold;
      cursor: pointer;
      box-shadow: 0 4px 10px rgba(0,0,0,0.2);
    }

    /* Content */
    #content {
      display: none;
      opacity: 0;
      transition: opacity 2s ease;
    }

    #title {
      font-size: 42px;
      letter-spacing: 3px;
      margin-bottom: 20px;
      text-transform: uppercase;
    }

    #poster {
      opacity: 0;
      transition: opacity 2s ease;
      margin-top: 25px;
      max-width: 85%;
      box-shadow: 0 0 30px rgba(0,0,0,0.3);
    }
  </style>
</head>

<body>

  <!-- INTRO -->
  <div id="intro">
    <h1>NOW PLAYING</h1>
  </div>

  <!-- LOGIN -->
  <div id="login">
    <h2>You already have the answer 💌</h2>

    <div class="input-box">
      <input type="password" id="password" placeholder="Enter password">
      <button onclick="checkPassword()">Unlock</button>
    </div>

    <p id="error" style="color:#ffd6d6;"></p>
  </div>

  <!-- CONTENT -->
  <div id="content">
    <h1 id="title">See You in Seattle…</h1>
    <img id="poster" src="see you in seattle (1).jpg">
  </div>

  <script>
    // INTRO → LOGIN (faster)
    window.onload = function() {
      setTimeout(function() {
        document.getElementById("intro").style.opacity = "0";

        setTimeout(function() {
          document.getElementById("intro").style.display = "none";
          document.getElementById("login").style.opacity = "1";
        }, 1500);

      }, 1500);
    };

    function checkPassword() {
      var pass = document.getElementById("password").value.toLowerCase();

      if (pass === "sleepless") {
        var login = document.getElementById("login");
        var content = document.getElementById("content");
        var poster = document.getElementById("poster");

        // fade out login (faster)
        login.style.opacity = "0";

        setTimeout(function() {
          login.style.display = "none";

          // transition to navy
          document.body.style.background = "#0B1F3A";

          content.style.display = "block";

          // fade in title
          setTimeout(function() {
            content.style.opacity = "1";
          }, 150);

          // fade in poster sooner
          setTimeout(function() {
            poster.style.opacity = "1";
          }, 1500);

        }, 1500);

        document.getElementById("error").innerText = "";
      } else {
        document.getElementById("error").innerText = "Not quite… try again 💭";
      }
    }
  </script>

</body>
</html>
